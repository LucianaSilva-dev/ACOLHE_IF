<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACOLHE IF - Login</title>
    <link rel="stylesheet" href="style/style.login.css">
</head>
<body>
    <div class="login-wrapper">
    <div class="login-card">

        <h1 class="logo-titulo">ACOLHE <span>IF</span></h1>

        <h2 class="login-title">Acesso do Aluno</h2>

      <form action="pagina_pre_atendimento.html" method="get">

        <div class="form-group">
          <label for="matricula">Matrícula</label>
          <input type="text" id="matricula" name="matricula" class="form-control" placeholder="Digite sua matrícula" required>
        </div>

        <div class="form-group">
          <label for="senha">Senha</label>
          <input type="password" id="senha" name="senha" class="form-control" placeholder="Digite sua senha" required>
        </div>

        <button type="submit" class="btn-mentor">Realizar Login</button>

      </form>

      <div class="login-links">
        <a href="cadastro.html" class="btn-outline-mentor">Criar uma conta</a>
        <a href="index.html" style="display: block; text-align: center; margin-top: 15px; color: #5fcf80; text-decoration: none;">Voltar ao início</a>
      </div>

    </div>
    </div>
</body>
</html>
